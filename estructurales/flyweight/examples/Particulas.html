<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Partículas - Sin Patrón</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background:#050816;
        cursor:none;
        font-family: Arial, sans-serif;
    }

    canvas{
        display:block;
    }

    .info{
        position:fixed;
        top:15px;
        left:15px;
        color:white;
        z-index:10;
        background:rgba(0,0,0,.6);
        padding:10px;
        border-radius:8px;
        border: 1px solid #FF00D4;
    }

    .info h3 {
        color: #FF00D4;
        margin-bottom: 5px;
    }

    .metrics{
        position:fixed;
        bottom:15px;
        right:15px;
        color:#00FF88;
        z-index:10;
        background:rgba(0,0,0,.6);
        padding:15px;
        border-radius:8px;
        border:1px solid #00FF88;
        font-size:12px;
        line-height:1.6;
        width: 200px;
    }

    .metrics h4 {
        margin-bottom:8px;
        color:#FF00D4;
        font-size:14px;
    }

    .metrics p {
        margin:4px 0;
    }

    .metrics span {
        color:#FFD700;
        font-weight:bold;
    }
</style>
</head>
<body>

<div class="info">
    <h3>Sin Patrón Flyweight</h3>
    <p>Mueve el mouse</p>
</div>

<div class="metrics">
    <h4>Métricas</h4>
    <p>FPS: <span id="fps">0</span></p>
    <p>Partículas: <span id="particulas">0</span></p>
    <p>Objetos: <span id="objetos">0</span></p>
    <p>Memoria: <span id="memoria">0</span> MB</p>
</div>

<canvas id="canvas"></canvas>

<script>

/* ============================================================
   PARTÍCULA - SIN PATRÓN
   Cada partícula tiene todos sus atributos
============================================================ */
class Particula {
    constructor(x, y, vx, vy, life, color, radius) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.life = life;
        this.maxLife = life;
        this.color = color;
        this.radius = radius;
    }

    actualizar() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
    }

    dibujar(ctx) {
        const opacity = this.life / this.maxLife;
        ctx.save();
        ctx.globalAlpha = opacity;
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    estaMuerta() {
        return this.life <= 0;
    }
}

/* ============================================================
   SISTEMA DE PARTÍCULAS - SIN PATRÓN
============================================================ */
class SistemaParticulas {
    constructor() {
        this.particulas = [];
    }

    crearParticulas(mouseX, mouseY) {
        const colores = ["#00F5FF", "#FF00D4", "#FFD700", "#00FF88"];
        const radioMargen = 40;

        for(let i = 0; i < 20; i++) {
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * radioMargen;
            const offsetX = Math.cos(angle) * distance;
            const offsetY = Math.sin(angle) * distance;

            const speed = Math.random() * 3 + 1;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            const color = colores[Math.floor(Math.random() * colores.length)];
            const radius = Math.floor(Math.random() * 4) + 2;

            this.particulas.push(
                new Particula(
                    mouseX + offsetX,
                    mouseY + offsetY,
                    vx,
                    vy,
                    60,
                    color,
                    radius
                )
            );
        }
    }

    actualizar() {
        for(let i = this.particulas.length - 1; i >= 0; i--) {
            const particula = this.particulas[i];
            particula.actualizar();
            if(particula.estaMuerta()) {
                this.particulas.splice(i, 1);
            }
        }
    }

    dibujar(ctx) {
        for(let i = 0; i < this.particulas.length; i++) {
            this.particulas[i].dibujar(ctx);
        }
    }
}

/* ============================================================
   INICIALIZACIÓN
============================================================ */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function redimensionarCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

redimensionarCanvas();
window.addEventListener("resize", redimensionarCanvas);

const sistema = new SistemaParticulas();
let frameCount = 0;
let lastTime = Date.now();
let fps = 0;

window.addEventListener("mousemove", (event) => {
    sistema.crearParticulas(event.clientX, event.clientY);
});

/* ============================================================
   MÉTRICAS
============================================================ */
function actualizarMetricas() {
    const ahora = Date.now();
    const tiempoTranscurrido = ahora - lastTime;
    
    if (tiempoTranscurrido >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastTime = ahora;
        
        document.getElementById("fps").textContent = fps;
        document.getElementById("particulas").textContent = sistema.particulas.length;
        document.getElementById("objetos").textContent = sistema.particulas.length;
        
        if (performance.memory) {
            const memoria = (performance.memory.usedJSHeapSize / 1048576).toFixed(2);
            document.getElementById("memoria").textContent = memoria;
        }
    }
    frameCount++;
}

/* ============================================================
   ANIMACIÓN
============================================================ */
function animar() {
    ctx.fillStyle = "rgba(5,8,22,0.20)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    sistema.actualizar();
    sistema.dibujar(ctx);
    actualizarMetricas();

    requestAnimationFrame(animar);
}

animar();

</script>

</body>
</html>
